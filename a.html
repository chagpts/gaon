<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전문가 상담 | US TAX SERVICE</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
      color: #232323;
      background: linear-gradient(
        135deg,
        #faf8f3 0%,
        #fffaf6 50%,
        #fff5f4 100%
      );
    }

    .consultation-section {
      padding: 80px 20px 100px;
    }

    .consultation-container {
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
    }

    .consultation-header {
      margin-bottom: 64px;
      text-align: center;
    }

    .consultation-header h1 {
      margin-bottom: 24px;
      font-size: 58px;
      font-weight: 800;
      line-height: 1.12;
      letter-spacing: -2.5px;
    }

    .consultation-header p {
      color: #5f5b57;
      font-size: 17px;
      line-height: 1.8;
    }

    .consultation-card {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 48px;
      padding: 48px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      background-color: rgba(255, 255, 255, 0.72);
      box-shadow: 0 20px 60px rgba(64, 47, 36, 0.08);
      backdrop-filter: blur(12px);
    }

    .contact-info {
      padding: 10px 0;
    }

    .contact-item {
      margin-bottom: 32px;
    }

    .contact-label {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 9px;
      font-size: 16px;
      font-weight: 700;
    }

    .contact-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .contact-value {
      padding-left: 29px;
      color: #6b6762;
      font-size: 15px;
      line-height: 1.7;
    }

    .contact-value a {
      color: inherit;
      text-decoration: none;
    }

    .contact-value a:hover {
      text-decoration: underline;
    }

    .consultation-form {
      width: 100%;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 9px;
      font-size: 15px;
      font-weight: 700;
    }

    .form-control {
      width: 100%;
      min-height: 50px;
      padding: 14px 16px;
      border: 1px solid #e5e0da;
      border-radius: 10px;
      background-color: #f8f6f2;
      color: #222;
      font: inherit;
      outline: none;
      transition:
        border-color 0.2s ease,
        background-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .form-control::placeholder {
      color: #a5a09a;
    }

    .form-control:focus {
      border-color: #37332f;
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(55, 51, 47, 0.08);
    }

    textarea.form-control {
      min-height: 130px;
      resize: vertical;
    }

    .submit-button {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 10px;
      background-color: #2f2d2b;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition:
        background-color 0.2s ease,
        transform 0.2s ease;
    }

    .submit-button:hover {
      background-color: #171615;
    }

    .submit-button:active {
      transform: translateY(1px);
    }

    .privacy-notice {
      margin-top: 14px;
      color: #827d77;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    @media (max-width: 800px) {
      .consultation-section {
        padding: 56px 16px 72px;
      }

      .consultation-header {
        margin-bottom: 40px;
      }

      .consultation-header h1 {
        font-size: 38px;
        letter-spacing: -1.5px;
      }

      .consultation-header p {
        font-size: 15px;
      }

      .consultation-card {
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 28px 22px;
        border-radius: 20px;
      }

      .contact-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px;
        padding-bottom: 24px;
        border-bottom: 1px solid #ece7e1;
      }

      .contact-item {
        margin-bottom: 0;
      }
    }

    @media (max-width: 520px) {
      .consultation-header h1 {
        font-size: 34px;
      }

      .contact-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="consultation-section">
    <div class="consultation-container">

      <header class="consultation-header">
        <h1>전문가와 상담하세요</h1>
        <p>
          문의 내용을 남겨주시면 담당 전문가가 빠르게 확인 후 연락드리겠습니다.
        </p>
      </header>

      <section class="consultation-card">

        <aside class="contact-info">
          <div class="contact-item">
            <div class="contact-label">
              <svg
                class="contact-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                aria-hidden="true"
              >
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                  19.79 19.79 0 0 1-8.63-3.07
                  19.5 19.5 0 0 1-6-6
                  19.79 19.79 0 0 1-3.07-8.67
                  A2 2 0 0 1 4.11 2h3
                  a2 2 0 0 1 2 1.72
                  c.12.9.33 1.78.62 2.63
                  a2 2 0 0 1-.45 2.11L8 9.73
                  a16 16 0 0 0 6 6l1.27-1.27
                  a2 2 0 0 1 2.11-.45
                  c.85.29 1.73.5 2.63.62
                  A2 2 0 0 1 22 16.92z" />
              </svg>
              <span>전화번호</span>
            </div>

            <div class="contact-value">
              <a href="tel:0262639622">02-6263-9622</a>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-label">
              <svg
                class="contact-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                aria-hidden="true"
              >
                <rect x="3" y="5" width="18" height="14" rx="2" />
                <path d="m3 7 9 6 9-6" />
              </svg>
              <span>이메일</span>
            </div>

            <div class="contact-value">
              <a href="mailto:corporate@ustaxes.co.kr">
                corporate@ustaxes.co.kr
              </a>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-label">
              <svg
                class="contact-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                aria-hidden="true"
              >
                <path d="M20 10c0 5-8 12-8 12S4 15 4 10
                  a8 8 0 1 1 16 0z" />
                <circle cx="12" cy="10" r="2.5" />
              </svg>
              <span>주소</span>
            </div>

            <div class="contact-value">
              서울 종로구 새문안로 76<br />
              콘코디언빌딩 3층
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-label">
              <svg
                class="contact-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                aria-hidden="true"
              >
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 2" />
              </svg>
              <span>상담 가능 시간</span>
            </div>

            <div class="contact-value">
              평일 10:00–17:00<br />
              주말 및 공휴일 휴무
            </div>
          </div>
        </aside>

        <form
          class="consultation-form"
          action="/api/contact"
          method="POST"
        >
          <div class="form-group">
            <label for="name">이름</label>
            <input
              class="form-control"
              type="text"
              id="name"
              name="name"
              placeholder="이름을 입력해 주세요."
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">전화번호</label>
            <input
              class="form-control"
              type="tel"
              id="phone"
              name="phone"
              placeholder="010-1234-5678"
              autocomplete="tel"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">이메일</label>
            <input
              class="form-control"
              type="email"
              id="email"
              name="email"
              placeholder="example@email.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea
              class="form-control"
              id="message"
              name="message"
              placeholder="상담을 원하시는 내용이나 현재 상황을 입력해 주세요."
              required
            ></textarea>
          </div>

          <button class="submit-button" type="submit">
            상담 신청하기
          </button>

          <p class="privacy-notice">
            입력해 주신 개인정보는 상담 목적 외에는 사용되지 않습니다.
          </p>
        </form>

      </section>
    </div>
  </main>
</body>
</html>
