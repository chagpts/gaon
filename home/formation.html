<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNIST - 미국 법인 설립</title>
  <style>
    :root {
      --bg: #fbf7f0;
      --card: #f3eee6;
      --card-border: #ddd6cb;
      --brown: #6f5730;
      --text: #1d1d1f;
      --muted: #49433d;
      --black: #222325;
      --radius-lg: 20px;
      --radius-md: 16px;
      --shadow: 0 18px 38px rgba(36, 31, 24, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding-bottom: 72px;
    }

    .header-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 12px 0 28px;
      background: linear-gradient(180deg, rgba(251,247,240,0.98), rgba(251,247,240,0.82) 72%, rgba(251,247,240,0));
      backdrop-filter: blur(8px);
    }

    header {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      min-height: 70px;
      padding: 0 18px 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fffdfa;
      border-radius: 0 0 20px 20px;
      box-shadow: var(--shadow);
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .logo .dot {
      width: 7px;
      height: 7px;
      margin: 0 2px;
      border-radius: 50%;
      background: #15c6c6;
      transform: translateY(-7px);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 54px;
      font-size: 16px;
      font-weight: 700;
    }

    .nav-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .chevron {
      font-size: 13px;
      transform: translateY(1px);
    }

    .consult-btn {
      padding: 16px 22px;
      border: 0;
      border-radius: 14px;
      color: #fff;
      background: var(--black);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .intro {
      margin-top: 26px;
      padding: 28px 26px;
      background: var(--brown);
      color: #fff;
      border-radius: var(--radius-md);
    }

    .intro h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.7px;
    }

    .intro p {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      opacity: 0.94;
    }

    .steps {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .step-card {
      width: 100%;
      padding: 26px 24px;
      text-align: left;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .step-card:hover,
    .step-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(35, 29, 20, 0.08);
      border-color: rgba(111, 87, 48, 0.42);
      outline: none;
    }

    .step-card.active {
      color: #fff;
      background: var(--brown);
      border-color: var(--brown);
      box-shadow: 0 16px 34px rgba(111, 87, 48, 0.22);
    }

    .step-card h2 {
      margin: 0 0 16px;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: -0.7px;
    }

    .step-card p {
      margin: 0;
      font-size: 17px;
      line-height: 1.55;
      font-weight: 500;
    }

    .step-card.active p {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 700;
    }

    .hero {
      margin-top: 30px;
      padding: 18px;
      min-height: 760px;
      display: grid;
      place-items: center;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background-image: var(--hero-image);
      background-position: center;
      background-size: cover;
      transition: background-image 0.35s ease, opacity 0.25s ease;
      box-shadow: inset 0 0 0 999px rgba(234, 190, 169, 0.18);
    }

    .hero-inner {
      width: 100%;
      height: 100%;
      min-height: 724px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.48);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.22)),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.24) 0, rgba(255,255,255,0.24) 1px, transparent 1px, transparent 16px);
    }

    .hero-content {
      max-width: 720px;
      padding: 28px 34px;
      text-align: center;
      color: #fff;
      border-radius: 18px;
      background: rgba(10, 12, 18, 0.40);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
    }

    .hero-eyebrow {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 800;
      color: rgba(255,255,255,0.82);
    }

    .hero-title {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: -0.7px;
    }

    .hero-desc {
      margin: 0;
      font-size: 17px;
      line-height: 1.6;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .business-types {
      display: grid;
      gap: 28px;
      margin-top: 92px;
    }

    .type-card {
      padding: 40px 38px;
      background: var(--card);
      border-radius: var(--radius-md);
    }

    .type-card h3 {
      margin: 0 0 28px;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.7px;
    }

    .type-card p {
      margin: 0 0 20px;
      font-size: 17px;
      font-weight: 500;
    }

    .type-card strong {
      display: block;
      font-size: 17px;
      line-height: 1.55;
    }

    @media (max-width: 760px) {
      .page,
      header {
        width: min(100% - 28px, 1180px);
      }

      header {
        padding: 0 12px 0 18px;
      }

      nav {
        display: none;
      }

      .logo {
        font-size: 26px;
      }

      .consult-btn {
        padding: 13px 16px;
        font-size: 14px;
      }

      .intro h1,
      .step-card h2,
      .type-card h3 {
        font-size: 23px;
      }

      .hero {
        min-height: 520px;
      }

      .hero-inner {
        min-height: 484px;
      }

      .hero-content {
        padding: 24px 20px;
      }

      .hero-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="header-wrap">
    <header>
      <a class="logo" href="#" aria-label="UNIST 홈">
        U<span class="dot"></span>NIST
      </a>

      <nav aria-label="주요 메뉴">
        <a href="#">미국 법인 설립</a>
        <a class="nav-item" href="#">운영 및 유지 <span class="chevron">⌄</span></a>
        <a href="#">미국 법인 청산</a>
      </nav>

      <button class="consult-btn" type="button">상담 신청</button>
    </header>
  </div>

  <main class="page">
    <section class="intro">
      <h1>법인 형태 선택</h1>
      <p>사업 모델과 성장 계획에 맞는 구조를 선택해 주세요.</p>
    </section>

    <section class="steps" aria-label="미국 법인 설립 절차">
      <button class="step-card active" type="button" data-key="type">
        <h2>법인 형태 선택</h2>
        <p>사업 모델과 성장 계획에 맞는 구조를 선택해 주세요.</p>
      </button>

      <button class="step-card" type="button" data-key="name">
        <h2>법인명 결정</h2>
        <p>주(State)별로 중복 등록이 불가하므로 3개 이상의 후보명을 준비해 주세요.</p>
      </button>

      <button class="step-card" type="button" data-key="address">
        <h2>법인 주소지 확보</h2>
        <p>사용 가능한 주소를 확인하시거나, 없으시면 공유 오피스 연결을 안내 및 연결 서비스를 제공해 드립니다.</p>
      </button>

      <button class="step-card" type="button" data-key="state">
        <h2>설립 주 선택</h2>
        <p>실제 영업 주 또는 사업 특성에 맞는 주를 검토해 주세요.</p>
      </button>
    </section>

    <section class="hero" id="hero" style="--hero-image: url('https://images.unsplash.com/photo-1518391846015-55a9cc003b25?auto=format&fit=crop&w=1800&q=80');" aria-live="polite">
      <div class="hero-inner">
        <div class="hero-content">
          <p class="hero-eyebrow" id="heroEyebrow">STEP 01</p>
          <h2 class="hero-title" id="heroTitle">법인 형태 선택</h2>
          <p class="hero-desc" id="heroDesc">C-Corp, LLC 등 사업 목적과 투자 계획에 맞는 구조를 먼저 선택합니다.</p>
        </div>
      </div>
    </section>

    <section class="business-types">
      <article class="type-card">
        <h3>C-Corp</h3>
        <p>외국인 설립 가능, 투자 유치에 유리</p>
        <strong>법인세와 배당 과세로 이중과세</strong>
      </article>

      <article class="type-card">
        <h3>LLC</h3>
        <p>구조가 유연하고 Pass-through 과세 가능</p>
        <strong>미국 시민권자 및 영주권자 제외한 외국인 단독 소유 시 신고가 복잡할 수 있음</strong>
      </article>
    </section>
  </main>

  <script>
    const stepData = {
      type: {
        eyebrow: 'STEP 01',
        title: '법인 형태 선택',
        desc: 'C-Corp, LLC 등 사업 목적과 투자 계획에 맞는 구조를 먼저 선택합니다.',
        image: 'https://images.unsplash.com/photo-1518391846015-55a9cc003b25?auto=format&fit=crop&w=1800&q=80'
      },
      name: {
        eyebrow: 'STEP 02',
        title: '법인명 결정',
        desc: '뉴욕의 밤처럼 선명하게 기억될 법인명을 후보군으로 정리하고 중복 여부를 확인합니다.',
        image: 'https://images.unsplash.com/photo-1534430480872-3498386e7856?auto=format&fit=crop&w=1800&q=80'
      },
      address: {
        eyebrow: 'STEP 03',
        title: '법인 주소지 확보',
        desc: '우편 수령, 관공서 서류, 은행 업무에 사용할 수 있는 안정적인 주소지를 준비합니다.',
        image: 'https://images.unsplash.com/photo-1485871981521-5b1fd3805eee?auto=format&fit=crop&w=1800&q=80'
      },
      state: {
        eyebrow: 'STEP 04',
        title: '설립 주 선택',
        desc: '실제 영업 지역, 세무 요건, 운영 비용을 비교해 적합한 설립 주를 선택합니다.',
        image: 'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?auto=format&fit=crop&w=1800&q=80'
      }
    };

    const cards = document.querySelectorAll('.step-card');
    const hero = document.getElementById('hero');
    const heroEyebrow = document.getElementById('heroEyebrow');
    const heroTitle = document.getElementById('heroTitle');
    const heroDesc = document.getElementById('heroDesc');
    const introTitle = document.querySelector('.intro h1');
    const introDesc = document.querySelector('.intro p');

    function setActiveStep(key) {
      const selected = stepData[key];
      if (!selected) return;

      cards.forEach((card) => {
        card.classList.toggle('active', card.dataset.key === key);
      });

      hero.style.opacity = '0.72';

      window.setTimeout(() => {
        hero.style.setProperty('--hero-image', `url('${selected.image}')`);
        heroEyebrow.textContent = selected.eyebrow;
        heroTitle.textContent = selected.title;
        heroDesc.textContent = selected.desc;
        introTitle.textContent = selected.title;
        introDesc.textContent = document.querySelector(`.step-card[data-key="${key}"] p`).textContent;
        hero.style.opacity = '1';
      }, 160);
    }

    cards.forEach((card) => {
      card.addEventListener('click', () => setActiveStep(card.dataset.key));
    });
  </script>
</body>
</html>
