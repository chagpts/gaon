<div class="income-file-group" data-income-file="dividend">
  <div class="file-box">
    <div class="file-info">
      <span class="file-name">배당 소득 관련 서류</span>
      <span class="file-hint">여러 파일을 선택할 수 있습니다.</span>
    </div>

    <input
      class="file-input"
      id="dividend-files"
      name="dividend_files[]"
      type="file"
      multiple
    />

    <label class="file-button" for="dividend-files">파일 선택</label>
  </div>

  <ul class="file-list" id="dividend-file-list"></ul>
</div>
