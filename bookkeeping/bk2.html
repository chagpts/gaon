<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기장 신청</title>

<style>
body{
font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
background:#f3f4f6;
margin:0;
}

.container{
max-width:800px;
margin:40px auto;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
padding:30px;
}

.section{
border-bottom:1px solid #e5e7eb;
padding:25px 0;
}

.section:last-child{
border-bottom:none;
}

.section-title{
font-size:20px;
font-weight:700;
margin-bottom:5px;
}

.section-desc{
color:#6b7280;
font-size:13px;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.grid-2{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.field label{
font-size:13px;
font-weight:600;
display:block;
margin-bottom:6px;
}

.field input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
}

.summary{
background:#f9fafb;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.summary-row{
display:flex;
justify-content:space-between;
padding:8px 0;
font-size:15px;
}

.total{
font-size:18px;
font-weight:700;
}

.button{
width:100%;
margin-top:25px;
background:#1d4ed8;
color:white;
border:none;
padding:15px;
border-radius:10px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.button:hover{
background:#1e40af;
}
</style>

</head>
<body>

<div class="container">

<!-- 계좌 -->
<div class="section">
<div class="section-title">계좌</div>
<div class="section-desc">계좌 수, 월별 거래량, 적용 개월수를 기준으로 산정</div>

<div class="grid">

<div class="field">
<label>계좌 수</label>
<input type="number" id="accountCount" value="2">
</div>

<div class="field">
<label>월별 거래량</label>
<input type="number" id="accountTx" value="0">
</div>

<div class="field">
<label>월 개월수</label>
<input type="number" id="accountMonth" value="1">
</div>

</div>
</div>

<!-- 카드 -->
<div class="section">
<div class="section-title">카드</div>
<div class="section-desc">카드 수, 월별 카드 거래수, 적용 개월수를 기준으로 산정</div>

<div class="grid">

<div class="field">
<label>카드 수</label>
<input type="number" id="cardCount" value="1">
</div>

<div class="field">
<label>월별 카드 거래수</label>
<input type="number" id="cardTx" value="0">
</div>

<div class="field">
<label>월 개월 수</label>
<input type="number" id="cardMonth" value="1">
</div>

</div>
</div>

<!-- 급여 신고 -->
<div class="section">
<div class="section-title">급여 신고</div>
<div class="section-desc">급여 기본료와 급여 1인 추가료를 반영</div>

<div class="grid">

<div class="field">
<label>급여 기본료 ($)</label>
<input type="number" id="payBase" value="0">
</div>

<div class="field">
<label>추가 인원 수</label>
<input type="number" id="payCount" value="0">
</div>

<div class="field">
<label>급여 1인 추가료 ($)</label>
<input type="number" id="payExtra" value="0">
</div>

</div>
</div>

<!-- 투자 -->
<div class="section">
<div class="section-title">투자</div>
<div class="section-desc">투자 수, 월별 투자 거래수, 적용 개월수를 기준으로 산정</div>

<div class="grid">

<div class="field">
<label>투자 수</label>
<input type="number" id="investCount" value="0">
</div>

<div class="field">
<label>월별 투자 거래수</label>
<input type="number" id="investTx" value="0">
</div>

<div class="field">
<label>월 개월 수</label>
<input type="number" id="investMonth" value="1">
</div>

</div>
</div>

<!-- 기타 -->
<div class="section">
<div class="section-title">기타</div>
<div class="section-desc">별도 비용 또는 특이사항 입력</div>

<div class="grid-2">

<div class="field">
<label>기타 금액 ($)</label>
<input type="number" id="etcFee" value="0">
</div>

<div class="field">
<label>기타 메모</label>
<input type="text" placeholder="예: 정리 작업, 추가 검토, 세팅 비용 등">
</div>

</div>
</div>

<!-- 요약 -->
<div class="summary">

<div class="summary-row">
<div>계좌 금액</div>
<div id="accountAmount">$0</div>
</div>

<div class="summary-row">
<div>카드 금액</div>
<div id="cardAmount">$0</div>
</div>

<div class="summary-row">
<div>급여 신고</div>
<div id="payAmount">$0</div>
</div>

<div class="summary-row">
<div>투자 금액</div>
<div id="investAmount">$0</div>
</div>

<div class="summary-row">
<div>기타 금액</div>
<div id="etcAmount">$0</div>
</div>

<hr>

<div class="summary-row total">
<div>총 결제 금액</div>
<div id="total">$0</div>
</div>

</div>

<button class="button">결제 신청</button>

</div>


<script>

const price={
account:20,
accountTx:1,
card:15,
cardTx:1,
invest:25,
investTx:2
}

function calc(){

let account=
document.getElementById("accountCount").value *
price.account *
document.getElementById("accountMonth").value +

document.getElementById("accountTx").value *
price.accountTx *
document.getElementById("accountMonth").value

let card=
document.getElementById("cardCount").value *
price.card *
document.getElementById("cardMonth").value +

document.getElementById("cardTx").value *
price.cardTx *
document.getElementById("cardMonth").value

let pay=
document.getElementById("payBase").value*1 +
document.getElementById("payCount").value *
document.getElementById("payExtra").value

let invest=
document.getElementById("investCount").value *
price.invest *
document.getElementById("investMonth").value +

document.getElementById("investTx").value *
price.investTx *
document.getElementById("investMonth").value

let etc=document.getElementById("etcFee").value*1

let total=account+card+pay+invest+etc

document.getElementById("accountAmount").innerText="$"+account
document.getElementById("cardAmount").innerText="$"+card
document.getElementById("payAmount").innerText="$"+pay
document.getElementById("investAmount").innerText="$"+invest
document.getElementById("etcAmount").innerText="$"+etc
document.getElementById("total").innerText="$"+total

}

document.querySelectorAll("input").forEach(e=>{
e.addEventListener("input",calc)
})

calc()

</script>

</body>
</html>
