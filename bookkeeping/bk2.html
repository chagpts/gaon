<script>
  function parseMoney(text) {
    return Number(text.replace(/[^0-9.-]+/g, "")) || 0;
  }

  function money(value) {
    return "$" + value.toLocaleString("en-US", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    });
  }

  function calculateTotal() {
    const accountAmount = parseMoney(document.getElementById("accountAmount").textContent);
    const cardAmount = parseMoney(document.getElementById("cardAmount").textContent);
    const payrollAmount = parseMoney(document.getElementById("payrollAmount").textContent);
    const investmentAmount = parseMoney(document.getElementById("investmentAmount").textContent);
    const otherAmount = parseMoney(document.getElementById("otherAmount").textContent);

    const totalAmount =
      accountAmount +
      cardAmount +
      payrollAmount +
      investmentAmount +
      otherAmount;

    document.getElementById("totalAmount").textContent = money(totalAmount);
    document.getElementById("bankAmount").textContent = money(totalAmount);
  }

  calculateTotal();
</script>
