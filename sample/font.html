<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폰트 비교 페이지</title>

  <!-- Google Fonts 예시 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;600;700&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      padding: 32px 24px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .desc {
      color: var(--muted);
      margin: 0;
    }

    .controls {
      max-width: 1200px;
      margin: 0 auto 24px;
      padding: 20px 24px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 160px 160px;
    }

    textarea,
    select,
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      background: white;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--muted);
    }

    .font-grid {
      max-width: 1200px;
      margin: 0 auto 48px;
      padding: 0 24px;
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .font-name {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .font-name strong {
      font-size: 16px;
    }

    .font-name span {
      color: var(--muted);
      font-size: 12px;
    }

    .sample {
      line-height: 1.65;
      word-break: keep-all;
      white-space: pre-wrap;
    }

    .noto-sans {
      font-family: "Noto Sans KR", sans-serif;
    }

    .noto-serif {
      font-family: "Noto Serif KR", serif;
    }

    .nanum-gothic {
      font-family: "Nanum Gothic", sans-serif;
    }

    .nanum-myeongjo {
      font-family: "Nanum Myeongjo", serif;
    }

    .system-sans {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .system-serif {
      font-family: Georgia, "Times New Roman", serif;
    }

    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>폰트 비교</h1>
    <p class="desc">문장을 입력하고 크기, 굵기, 자간을 바꿔가며 폰트를 비교해보세요.</p>
  </header>

  <section class="controls">
    <div>
      <label for="sampleText">비교할 문장</label>
      <textarea id="sampleText">가나다라마바사아자차카타파하
The quick brown fox jumps over the lazy dog.
1234567890 !@#$%^&*()

브랜드의 첫인상을 결정하는 것은 생각보다 작은 디테일입니다.</textarea>
    </div>

    <div>
      <label for="fontSize">글자 크기</label>
      <input id="fontSize" type="range" min="14" max="56" value="24" />
    </div>

    <div>
      <label for="fontWeight">굵기</label>
      <select id="fontWeight">
        <option value="400">Regular 400</option>
        <option value="500">Medium 500</option>
        <option value="600">SemiBold 600</option>
        <option value="700">Bold 700</option>
      </select>
    </div>

    <div>
      <label for="letterSpacing">자간</label>
      <input id="letterSpacing" type="range" min="-2" max="4" step="0.1" value="0" />
    </div>
  </section>

  <main class="font-grid">
    <article class="card">
      <div class="font-name">
        <strong>Noto Sans KR</strong>
        <span>Sans-serif</span>
      </div>
      <div class="sample noto-sans"></div>
    </article>

    <article class="card">
      <div class="font-name">
        <strong>Noto Serif KR</strong>
        <span>Serif</span>
      </div>
      <div class="sample noto-serif"></div>
    </article>

    <article class="card">
      <div class="font-name">
        <strong>Nanum Gothic</strong>
        <span>Sans-serif</span>
      </div>
      <div class="sample nanum-gothic"></div>
    </article>

    <article class="card">
      <div class="font-name">
        <strong>Nanum Myeongjo</strong>
        <span>Serif</span>
      </div>
      <div class="sample nanum-myeongjo"></div>
    </article>

    <article class="card">
      <div class="font-name">
        <strong>System Sans</strong>
        <span>Default</span>
      </div>
      <div class="sample system-sans"></div>
    </article>

    <article class="card">
      <div class="font-name">
        <strong>System Serif</strong>
        <span>Default</span>
      </div>
      <div class="sample system-serif"></div>
    </article>
  </main>

  <script>
    const sampleText = document.getElementById("sampleText");
    const fontSize = document.getElementById("fontSize");
    const fontWeight = document.getElementById("fontWeight");
    const letterSpacing = document.getElementById("letterSpacing");
    const samples = document.querySelectorAll(".sample");

    function updateSamples() {
      samples.forEach(sample => {
        sample.textContent = sampleText.value;
        sample.style.fontSize = `${fontSize.value}px`;
        sample.style.fontWeight = fontWeight.value;
        sample.style.letterSpacing = `${letterSpacing.value}px`;
      });
    }

    sampleText.addEventListener("input", updateSamples);
    fontSize.addEventListener("input", updateSamples);
    fontWeight.addEventListener("change", updateSamples);
    letterSpacing.addEventListener("input", updateSamples);

    updateSamples();
  </script>
</body>
</html>
