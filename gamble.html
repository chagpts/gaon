<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>16명 4테이블 뽑기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      max-width: 600px;
      margin: 0 auto 30px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      height: 180px;
      font-size: 16px;
      padding: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    .tables {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .table-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .table-box h2 {
      text-align: center;
      margin-top: 0;
    }

    .table-box ul {
      list-style: none;
      padding: 0;
    }

    .table-box li {
      padding: 10px;
      margin: 8px 0;
      background: #eee;
      border-radius: 6px;
      text-align: center;
      font-size: 18px;
    }

    .tony {
      background: #ffe08a !important;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .tables {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .tables {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <h1>16명 4테이블 랜덤 뽑기</h1>

  <div class="input-area">
    <p>
      참가자 16명을 한 줄에 한 명씩 입력하세요.<br>
      <strong>TONY는 반드시 포함되어야 하며, 무조건 A조에 배정됩니다.</strong>
    </p>

    <textarea id="names">TONY
철수
영희
민수
지민
수현
지훈
서연
도윤
하준
예준
서준
하윤
지아
유진
민재</textarea>

    <button onclick="drawTables()">뽑기</button>
  </div>

  <div class="tables" id="result"></div>

  <script>
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function drawTables() {
      const textarea = document.getElementById("names");
      let names = textarea.value
        .split("\n")
        .map(name => name.trim())
        .filter(name => name !== "");

      if (names.length !== 16) {
        alert("참가자는 정확히 16명이어야 합니다.");
        return;
      }

      const hasTony = names.some(name => name.toUpperCase() === "TONY");

      if (!hasTony) {
        alert("TONY가 반드시 포함되어야 합니다.");
        return;
      }

      const uniqueNames = new Set(names.map(name => name.toUpperCase()));
      if (uniqueNames.size !== 16) {
        alert("중복된 이름이 있습니다. 이름을 확인해주세요.");
        return;
      }

      // TONY 제외
      let others = names.filter(name => name.toUpperCase() !== "TONY");

      // 나머지 15명 랜덤 섞기
      shuffle(others);

      // A조는 TONY + 3명
      const groups = {
        "A조": ["TONY", ...others.slice(0, 3)],
        "B조": others.slice(3, 7),
        "C조": others.slice(7, 11),
        "D조": others.slice(11, 15)
      };

      const result = document.getElementById("result");
      result.innerHTML = "";

      for (const groupName in groups) {
        const box = document.createElement("div");
        box.className = "table-box";

        const title = document.createElement("h2");
        title.textContent = groupName;
        box.appendChild(title);

        const ul = document.createElement("ul");

        groups[groupName].forEach(name => {
          const li = document.createElement("li");
          li.textContent = name;

          if (name.toUpperCase() === "TONY") {
            li.className = "tony";
          }

          ul.appendChild(li);
        });

        box.appendChild(ul);
        result.appendChild(box);
      }
    }
  </script>

</body>
</html>
