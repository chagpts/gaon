<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA 등록 및 갱신 신청</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 18px;
    }

    .sub-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .service-box {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .service-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 20px;
      border-bottom: 1px solid #ededed;
    }

    .service-item:last-child {
      border-bottom: none;
    }

    .service-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .service-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .service-price {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      margin-left: 20px;
    }

    .total-box {
      margin-top: 18px;
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 18px;
      font-weight: 700;
    }

    .total-price {
      font-size: 22px;
      font-weight: 800;
      color: #111;
    }

    .form-section {
      margin-top: 28px;
    }

    .form-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1f5eff;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 28px;
      background: #0d47a1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #0a3b86;
    }

    @media (max-width: 640px) {
      .service-item {
        flex-direction: column;
        gap: 8px;
      }

      .service-price {
        margin-left: 0;
      }

      .row-2 {
        grid-template-columns: 1fr;
      }

      .total-box {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section-title">RA 등록 또는 갱신 신청</div>

    <div class="card">
      <div class="sub-title">선택한 서비스</div>

      <div class="service-box">
        <div class="service-item">
          <div>
            <div class="service-name">RA 등록 및 갱신 서비스</div>
          </div>
          <div class="service-price">$250</div>
        </div>

        <div class="service-item">
          <div>
            <div class="service-name">RA 주소 등록 비용</div>
            <div class="service-desc">
              아래에 고객 카드 정보 및 주소 정보를 입력할 수 있습니다.
            </div>
          </div>
          <div class="service-price">$50</div>
        </div>
      </div>

      <div class="total-box">
        <div class="total-label">총 결제 금액</div>
        <div class="total-price">$250</div>
      </div>

      <div class="form-section">
        <div class="form-title">고객 카드 정보 입력</div>

        <form>
          <div class="form-grid">
            <div class="form-group">
              <label for="signature">서명</label>
              <input type="text" id="signature" name="signature" placeholder="서명을 입력하세요" />
            </div>

            <div class="form-group">
              <label for="cardNumber">카드번호</label>
              <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" />
            </div>

            <div class="row-2">
              <div class="form-group">
                <label for="expiry">유효기간</label>
                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" />
              </div>

              <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" />
              </div>
            </div>

            <div class="form-group">
              <label for="address">주소</label>
              <textarea id="address" name="address" rows="4" placeholder="청구지 주소를 입력하세요"></textarea>
            </div>
          </div>

          <button type="submit" class="submit-btn">결제 신청</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
