<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>미국 법인 설립 | UST</title>
  <style>
    :root { --black:#050505; --white:#fff; --paper:#f4f0ea; }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; color:#151515; background:var(--paper); font-family:Pretendard,"Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif; }

    .site-header {
      position:fixed; top:14px; left:50%; z-index:50; transform:translateX(-50%);
      width:min(1128px,calc(100% - 32px)); height:68px; padding:0 12px 0 22px;
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
      border:1px solid rgba(255,255,255,.45); border-radius:24px;
      background:rgba(255,255,255,.88); backdrop-filter:blur(16px);
      box-shadow:0 14px 42px rgba(0,0,0,.12);
    }
    .logo { color:#080808; text-decoration:none; font-size:30px; font-weight:950; letter-spacing:-2px; }
    .logo i { font-style:normal; font-size:17px; margin:0 2px; color:#39bff4; }
    .main-nav { display:flex; gap:38px; white-space:nowrap; }
    .main-nav a { color:#171717; text-decoration:none; font-size:14px; font-weight:800; }
    .consult-btn { justify-self:end; padding:14px 18px; border-radius:12px; color:#fff; background:#191919; text-decoration:none; font-size:14px; font-weight:800; }

    .hero {
      position:relative; height:100svh; min-height:720px; overflow:hidden;
      background:var(--black); color:var(--white); isolation:isolate;
    }
    .grain { position:absolute; inset:0; pointer-events:none; opacity:.09; z-index:10;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.86' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
    }
    .scene { position:absolute; inset:0; opacity:0; animation:scene 18s infinite; }
    .scene.s1 { animation-delay:0s; }
    .scene.s2 { animation-delay:4.5s; }
    .scene.s3 { animation-delay:9s; }
    .scene.s4 { animation-delay:13.5s; }

    .word { position:absolute; margin:0; color:#fff; font-weight:700; line-height:1.15; letter-spacing:-.035em; }
    .s1 .w1 { left:9%; top:28%; font-size:clamp(20px,2vw,36px); }
    .s1 .w2 { right:11%; top:43%; font-size:clamp(15px,1.35vw,24px); }
    .s1 .w3 { left:22%; bottom:18%; font-size:clamp(13px,1vw,18px); }
    .s1 .w4 { right:28%; bottom:12%; font-size:clamp(12px,.9vw,16px); }

    .media-card { position:absolute; overflow:hidden; background:#1a1a1a; }
    .media-card::before { content:""; position:absolute; inset:-8%; background-size:cover; background-position:center; animation:slowZoom 7s ease-in-out infinite alternate; }
    .m1 { width:21vw; min-width:250px; aspect-ratio:16/10; left:29%; top:20%; }
    .m1::before { background:linear-gradient(135deg,rgba(8,8,8,.15),rgba(8,8,8,.05)), url('/mnt/data/image.png'); }
    .m2 { width:16vw; min-width:190px; aspect-ratio:4/3; right:14%; bottom:16%; }
    .m2::before { background:linear-gradient(145deg,#b98357,#efe0c5 48%,#56473f); }
    .m3 { width:14vw; min-width:170px; aspect-ratio:4/3; left:7%; bottom:12%; }
    .m3::before { background:linear-gradient(145deg,#29465b,#8fc1d7 45%,#d7ad7f); }

    .split-frame { position:absolute; left:50%; top:50%; width:min(720px,70vw); height:min(340px,40vw); transform:translate(-50%,-50%); display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .split-frame span { position:relative; overflow:hidden; background:#222; }
    .split-frame span:first-child { background:linear-gradient(140deg,#151e2b 0 35%,#4f7898 36% 62%,#d6e2e5 63%); }
    .split-frame span:last-child { background:radial-gradient(circle at 52% 50%,#17130f 0 10%,#8a6644 11% 22%,#415e5e 23% 40%,#151515 41%); }
    .s2 .big { left:50%; top:16%; transform:translateX(-50%); width:100%; text-align:center; font-size:clamp(24px,3.5vw,62px); font-weight:850; }

    .s3 { display:grid; place-items:center; }
    .brand-reveal { font-size:clamp(56px,10vw,170px); font-weight:900; letter-spacing:-.08em; }
    .brand-reveal span { display:inline-block; opacity:0; transform:translateY(35px); animation:letterIn 4.5s infinite; }
    .brand-reveal span:nth-child(2){animation-delay:.12s}.brand-reveal span:nth-child(3){animation-delay:.24s}.brand-reveal span:nth-child(4){animation-delay:.36s}.brand-reveal span:nth-child(5){animation-delay:.48s}.brand-reveal span:nth-child(6){animation-delay:.6s}

    .final-grid { position:absolute; inset:0; display:grid; place-items:center; padding:120px 8vw 60px; }
    .final-inner { width:min(1180px,100%); position:relative; }
    .final-title { margin:0; font-size:clamp(68px,11vw,180px); line-height:.78; letter-spacing:-.085em; text-transform:uppercase; font-weight:950; }
    .final-title span { display:block; }
    .final-title .indent { margin-left:22%; }
    .image-strip { position:absolute; inset:15% 6% 8% 10%; z-index:-1; display:grid; grid-template-columns:1fr .62fr 1fr; gap:8px; transform:skewX(-2deg); }
    .image-strip i { display:block; background:#333; overflow:hidden; }
    .image-strip i:nth-child(1){background:linear-gradient(140deg,#d7b48f,#6a4b35 55%,#263c48)}
    .image-strip i:nth-child(2){background:linear-gradient(160deg,#ebebeb,#9c8771 48%,#251d18)}
    .image-strip i:nth-child(3){background:linear-gradient(130deg,#b9c2cb,#31495b 52%,#d3a26b)}
    .final-copy { position:absolute; right:0; bottom:-5px; width:min(430px,38vw); margin:0; font-size:clamp(14px,1.05vw,18px); line-height:1.6; font-weight:600; color:rgba(255,255,255,.9); }
    .start-btn { position:absolute; left:8vw; bottom:45px; z-index:20; color:#111; background:#fff; text-decoration:none; padding:15px 22px; border-radius:999px; font-weight:850; }
    .progress { position:absolute; left:0; bottom:0; z-index:30; height:3px; width:100%; background:rgba(255,255,255,.15); }
    .progress::after { content:""; display:block; height:100%; background:#fff; transform-origin:left; animation:progress 18s linear infinite; }

    .precheck { min-height:430px; display:grid; place-items:center; padding:90px 24px; }
    .precheck h2 { margin:0; font-size:clamp(44px,5vw,72px); letter-spacing:-.06em; }

    @keyframes scene { 0%,3%{opacity:0} 8%,21%{opacity:1} 25%,100%{opacity:0} }
    @keyframes slowZoom { from{transform:scale(1.02)} to{transform:scale(1.12) translate(-2%,1%)} }
    @keyframes letterIn { 0%,12%{opacity:0;transform:translateY(35px)} 28%,72%{opacity:1;transform:none} 88%,100%{opacity:0;transform:translateY(-20px)} }
    @keyframes progress { from{transform:scaleX(0)} to{transform:scaleX(1)} }

    @media (max-width:760px){
      .site-header{grid-template-columns:1fr auto;height:62px}.main-nav{display:none}.consult-btn{padding:12px 14px}.logo{font-size:26px}
      .hero{min-height:680px}.m1{left:17%;top:24%;width:62vw}.m2{right:5%;bottom:18%;width:34vw}.m3{left:5%;bottom:15%;width:31vw}
      .s1 .w1{left:7%;top:18%}.s1 .w2{right:5%;top:62%}.s1 .w3{left:9%;bottom:8%}
      .split-frame{width:82vw;height:46vw}.s2 .big{top:22%}
      .final-title{font-size:clamp(58px,18vw,110px);line-height:.83}.final-title .indent{margin-left:10%}
      .image-strip{inset:23% 0 15% 0}.final-copy{position:relative;right:auto;bottom:auto;width:85%;margin:32px 0 0 12%;font-size:14px}
      .start-btn{left:24px;bottom:36px}
    }

    @media (prefers-reduced-motion:reduce){
      .scene{animation:none;opacity:0}.scene.s4{opacity:1}.progress::after,.media-card::before,.brand-reveal span{animation:none}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="#">U<i>\</i>ST</a>
    <nav class="main-nav" aria-label="주요 메뉴">
      <a href="#">미국 법인 설립</a><a href="#">운영 및 유지⌄</a><a href="#">미국 법인 청산</a>
    </nav>
    <a class="consult-btn" href="#">상담 신청</a>
  </header>

  <main>
    <section class="hero" aria-label="미국 법인 설립 소개">
      <div class="grain"></div>

      <div class="scene s1">
        <p class="word w1">미국 진출의 시작은<br>법인 설립부터</p>
        <p class="word w2">단순한 등록 절차가 아닌</p>
        <p class="word w3">사업 구조 · 세무 · 운영</p>
        <p class="word w4">하나의 흐름으로 설계합니다</p>
        <div class="media-card m1"></div><div class="media-card m2"></div><div class="media-card m3"></div>
      </div>

      <div class="scene s2">
        <p class="word big">사업을 보는 새로운 기준</p>
        <div class="split-frame"><span></span><span></span></div>
      </div>

      <div class="scene s3">
        <div class="brand-reveal" aria-label="UST"><span>U</span><span>S</span><span>&nbsp;</span><span>T</span><span>A</span><span>X</span></div>
      </div>

      <div class="scene s4">
        <div class="final-grid">
          <div class="final-inner">
            <div class="image-strip"><i></i><i></i><i></i></div>
            <h1 class="final-title"><span>미국 법인</span><span class="indent">설립은</span><span>시작입니다</span></h1>
            <p class="final-copy">미국 진출을 준비하는 기업에게 법인 설립은 향후 세무 신고와 운영 관리의 기준이 되는 중요한 출발점입니다. 사업 구조에 맞는 법인 형태 검토부터 설립, 세무 신고, 운영 관리까지 전 과정을 지원합니다.</p>
          </div>
        </div>
      </div>

      <a class="start-btn" href="#precheck">시작하기 →</a>
      <div class="progress" aria-hidden="true"></div>
    </section>

    <section class="precheck" id="precheck"><h2>설립 전 확인 사항</h2></section>
  </main>
</body>
</html>
